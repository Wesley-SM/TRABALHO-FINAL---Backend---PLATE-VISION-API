spring.application.name=plate-vision-api

# Configuracoes do Banco H2 em memoria
spring.datasource.url=jdbc:h2:mem:platevisiondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita o console do H2 para testar no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Faz o Hibernate criar as tabelas automaticamente com base no codigo Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Define o tamanho mßximo de cada foto enviada
spring.servlet.multipart.max-file-size=100MB

# Define o tamanho mßximo da requisińŃo completa
spring.servlet.multipart.max-request-size=100MB


# Puxando a chave do Gemini do seu .env
GEMINI_API_KEY=${GEMINI_API_KEY}

